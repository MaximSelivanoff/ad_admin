version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ad_admin_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=your-secret-key-change-me
    volumes:
      - ./backend/data:/app/data
    networks:
      - ad_admin_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ad_admin_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - ad_admin_network

networks:
  ad_admin_network:
    driver: bridge
